services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: sqlite:///data/slidecast.db
      SQLITE_DB_PATH: data/slidecast.db
      CORS_ORIGINS: http://localhost:8080,http://127.0.0.1:8080
      PORT: 5000
      FLASK_DEBUG: "false"
    ports:
      - "5000:5000"
    volumes:
      - backend-data:/app/data

  frontend:
    build:
      context: ./slidecast-ai/slidecast-ai
      args:
        VITE_API_URL: http://localhost:5000
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  backend-data:
